<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --primary:#4f46e5;
  --primary-dark:#4338ca;
  --primary-light:#6366f1;
  --success:#059669;
  --success-dark:#047857;
  --success-light:#10b981;
  --danger:#dc2626;
  --danger-dark:#b91c1c;
  --info:#0284c7;
  --info-light:#0ea5e9;
  --warning:#f59e0b;
  --bg-primary:#f8fafc;
  --bg-secondary:#ffffff;
  --bg-tertiary:#f1f5f9;
  --text-primary:#0f172a;
  --text-secondary:#475569;
  --text-muted:#64748b;
  --border:#e2e8f0;
  --border-dark:#cbd5e1;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 6px rgba(0,0,0,0.07);
  --shadow-lg:0 10px 25px rgba(0,0,0,0.1);
  --shadow-xl:0 20px 40px rgba(0,0,0,0.12);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
}

/* Elegant background pattern */
body::before{
  content:'';
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 15% 25%,rgba(79,70,229,0.04) 0%,transparent 50%),
    radial-gradient(circle at 85% 75%,rgba(5,150,105,0.04) 0%,transparent 50%),
    radial-gradient(circle at 50% 50%,rgba(2,132,199,0.03) 0%,transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* ===== HEADER ===== */
.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}

.topbar-inner{
  max-width:1200px;
  margin:0 auto;
  padding:20px 32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand-icon{
  width:46px;
  height:46px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  box-shadow:0 4px 12px rgba(79,70,229,0.3);
}

.brand h2{
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.5px;
  color:var(--text-primary);
  margin:0;
}

.logout{
  padding:11px 24px;
  background:linear-gradient(135deg,var(--danger),var(--danger-dark));
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 2px 8px rgba(220,38,38,0.3);
}

.logout:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(220,38,38,0.4);
}

.logout:active{
  transform:translateY(0);
}

/* ===== MAIN CONTENT ===== */
.page{
  max-width:1200px;
  margin:0 auto;
  padding:40px 32px;
  position:relative;
  z-index:1;
}

/* ===== WELCOME BANNER ===== */
.welcome-banner{
  background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(99,102,241,0.05));
  border-radius:20px;
  padding:32px;
  margin-bottom:32px;
  border:1px solid rgba(79,70,229,0.15);
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
  animation:fadeUp 0.6s cubic-bezier(0.4,0,0.2,1);
}

.welcome-banner::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:4px;
  background:linear-gradient(90deg,var(--primary),var(--primary-light),var(--info-light));
}

.welcome-banner h3{
  font-size:26px;
  font-weight:700;
  margin-bottom:8px;
  color:var(--text-primary);
  letter-spacing:-0.5px;
}

.welcome-banner p{
  color:var(--text-secondary);
  font-size:15px;
  margin:0;
}

/* ===== STUDENT INFO CARD ===== */
#info{
  background:var(--bg-secondary);
  border-radius:16px;
  padding:28px;
  margin-bottom:32px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  line-height:1.8;
  font-size:15px;
  animation:fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) 0.1s backwards;
}

#info b{
  font-weight:700;
  color:var(--text-primary);
  display:inline-block;
  min-width:80px;
}

/* ===== SECTION HEADER ===== */
.section-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
  padding-bottom:16px;
  border-bottom:2px solid var(--border);
  animation:fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) 0.2s backwards;
}

.section-title{
  display:flex;
  align-items:center;
  gap:12px;
}

.section-icon{
  width:48px;
  height:48px;
  background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(79,70,229,0.05));
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  border:1px solid rgba(79,70,229,0.15);
}

.section-title h3{
  font-size:20px;
  font-weight:700;
  color:var(--text-primary);
  margin:0;
  letter-spacing:-0.3px;
}

/* ===== SCORE CARDS ===== */
.score-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-bottom:32px;
  animation:fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) 0.3s backwards;
}

.score-card{
  background:var(--bg-secondary);
  border-radius:16px;
  padding:24px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  position:relative;
  overflow:hidden;
}

.score-card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  transition:opacity 0.3s ease;
}

.score-card.danger::before{
  background:linear-gradient(90deg,var(--danger),var(--danger-light));
}

.score-card.success::before{
  background:linear-gradient(90deg,var(--success),var(--success-light));
}

.score-card.primary::before{
  background:linear-gradient(90deg,var(--primary),var(--primary-light));
}

.score-card:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow-lg);
}

.score-card:hover::before{
  opacity:1;
}

.score-label{
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:8px;
}

.score-value{
  font-size:36px;
  font-weight:700;
  color:var(--text-primary);
  line-height:1;
  margin-bottom:8px;
}

.score-card.danger .score-value{
  color:var(--danger);
}

.score-card.success .score-value{
  color:var(--success);
}

.score-card.primary .score-value{
  color:var(--primary);
}

.score-desc{
  font-size:13px;
  color:var(--text-muted);
}

/* ===== DOWNLOAD BUTTON ===== */
.download-btn{
  padding:12px 24px;
  background:linear-gradient(135deg,var(--success),var(--success-dark));
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 2px 8px rgba(5,150,105,0.3);
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'Inter',sans-serif;
  margin-bottom:20px;
}

.download-btn::before{
  content:'📥';
  font-size:16px;
}

.download-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(5,150,105,0.4);
}

.download-btn:active{
  transform:translateY(0);
}

/* ===== TABLE CONTAINER ===== */
.table-container{
  background:var(--bg-secondary);
  border-radius:16px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) 0.4s backwards;
}

.table-wrapper{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

.table-wrapper::-webkit-scrollbar{
  height:10px;
}

.table-wrapper::-webkit-scrollbar-track{
  background:var(--bg-tertiary);
  border-radius:5px;
}

.table-wrapper::-webkit-scrollbar-thumb{
  background:var(--primary);
  border-radius:5px;
}

.table-wrapper::-webkit-scrollbar-thumb:hover{
  background:var(--primary-light);
}

/* ===== TABLES ===== */
table{
  width:100%;
  border-collapse:collapse;
  background:var(--bg-secondary);
}

#score table{
  min-width:500px;
}

#history table{
  min-width:650px;
}

thead{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--bg-secondary);
}

th{
  background:linear-gradient(to bottom,#f8fafc,#f1f5f9);
  color:var(--text-secondary);
  padding:16px 20px;
  text-align:left;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
  border-bottom:2px solid var(--border-dark);
  white-space:nowrap;
}

tbody tr{
  border-bottom:1px solid var(--border);
  transition:all 0.2s ease;
}

tbody tr:hover{
  background:var(--bg-tertiary);
}

tbody tr:last-child{
  border-bottom:none;
}

td{
  padding:16px 20px;
  color:var(--text-primary);
  font-size:14px;
  font-weight:500;
  text-align:left;
}

td b{
  font-weight:700;
  color:var(--primary);
}

/* ===== EMPTY STATE ===== */
.empty-state{
  padding:60px 20px;
  text-align:center;
}

.empty-state-icon{
  font-size:56px;
  margin-bottom:16px;
  opacity:0.2;
}

.empty-state-text{
  color:var(--text-secondary);
  font-size:16px;
  font-weight:500;
}

/* ===== BADGE STYLES (for table) ===== */
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border-radius:16px;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.3px;
}

.badge-mis{
  background:linear-gradient(135deg,rgba(220,38,38,0.15),rgba(220,38,38,0.08));
  color:var(--danger-dark);
  border:1px solid rgba(220,38,38,0.2);
}

.badge-good{
  background:linear-gradient(135deg,rgba(5,150,105,0.15),rgba(5,150,105,0.08));
  color:var(--success-dark);
  border:1px solid rgba(5,150,105,0.2);
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .topbar-inner{
    padding:16px 20px;
  }

  .brand-icon{
    width:40px;
    height:40px;
    font-size:20px;
  }

  .brand h2{
    font-size:18px;
  }

  .logout{
    padding:9px 18px;
    font-size:13px;
  }

  .page{
    padding:24px 20px;
  }

  .welcome-banner{
    padding:24px 20px;
    margin-bottom:24px;
  }

  .welcome-banner h3{
    font-size:22px;
  }

  .welcome-banner p{
    font-size:14px;
  }

  #info{
    padding:20px;
    margin-bottom:24px;
    font-size:14px;
  }

  .section-header{
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
  }

  .section-icon{
    width:44px;
    height:44px;
    font-size:22px;
  }

  .section-title h3{
    font-size:18px;
  }

  .score-grid{
    grid-template-columns:1fr;
    gap:16px;
    margin-bottom:24px;
  }

  .score-card{
    padding:20px;
  }

  .score-value{
    font-size:32px;
  }

  .download-btn{
    width:100%;
    justify-content:center;
    padding:13px 20px;
  }

  th{
    padding:12px 16px;
    font-size:11px;
  }

  td{
    padding:12px 16px;
    font-size:13px;
  }
}

@media(min-width:1024px){
  .page{
    padding:48px 40px;
  }

  .welcome-banner{
    padding:40px;
  }
}

/* ===== ACCESSIBILITY ===== */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}

*:focus-visible{
  outline:2px solid var(--primary);
  outline-offset:2px;
  border-radius:4px;
}

/* ===== PRINT STYLES ===== */
@media print{
  .topbar,.download-btn{
    display:none;
  }
  
  .page{
    max-width:100%;
    padding:20px;
  }

  .score-card,.table-container{
    page-break-inside:avoid;
    box-shadow:none;
    border:1px solid #000;
  }
}
</style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<!-- HEADER -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-icon">🎓</div>
      <h2>Student Dashboard</h2>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="page">

  <!-- WELCOME BANNER -->
  <div class="welcome-banner">
    <h3>Welcome Back! 👋</h3>
    <p>Track your discipline scores and behavioral records in one place</p>
  </div>

  <!-- STUDENT INFO -->
  <div id="info"></div>

  <!-- SCORE SUMMARY -->
  <div class="section-header">
    <div class="section-title">
      <div class="section-icon">📊</div>
      <h3>Score Summary</h3>
    </div>
  </div>

  <div id="score"></div>

  <!-- ATTITUDE HISTORY -->
  <div class="section-header">
    <div class="section-title">
      <div class="section-icon">🧠</div>
      <h3>Attitude History</h3>
    </div>
  </div>

  <button class="download-btn" onclick="downloadStudentPDF()">Download Report</button>

  <div id="history"></div>

</div>

<script src="app.js"></script>

<script>
/* ===== ORIGINAL LOGIC – UNCHANGED ===== */
const info = document.getElementById("info");
const history = document.getElementById("history");
const scoreBox = document.getElementById("score");

const student = JSON.parse(localStorage.getItem("student"));

if(!student){
  alert("Session expired");
  location = "index.html";
}

info.innerHTML = `
<b>Name:</b> ${student.name}<br>
<b>Roll:</b> ${student.roll}<br>
<b>Dept:</b> ${student.dept} | ${student.year}-${student.section}
`;

fetch(API,{
  method:"POST",
  body: JSON.stringify({
    action:"studentDashboard",
    roll: student.roll
  })
})
.then(r=>r.json())
.then(d=>{

  if(d.score){
    scoreBox.innerHTML = `
      <div class="score-grid">
        <div class="score-card danger">
          <div class="score-label">Disobey Points</div>
          <div class="score-value">${d.score[5]}</div>
          <div class="score-desc">Total negative marks</div>
        </div>
        <div class="score-card success">
          <div class="score-label">GOOD Behavior Points</div>
          <div class="score-value">${d.score[6]}</div>
          <div class="score-desc">Total positive marks</div>
        </div>
        <div class="score-card primary">
          <div class="score-label">Available Points</div>
          <div class="score-value">${d.score[7]}</div>
          <div class="score-desc">Net balance score</div>
        </div>
      </div>
    `;
  } else {
    scoreBox.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <div class="empty-state-text">No score data available</div>
      </div>
    `;
  }

  if(!d.history || d.history.length === 0){
    history.innerHTML = `
      <div class="table-container">
        <div class="empty-state">
          <div class="empty-state-icon">🧠</div>
          <div class="empty-state-text">No attitude records found</div>
        </div>
      </div>
    `;
    return;
  }

  history.innerHTML = `
    <div class="table-container">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Attitude</th>
              <th>Points</th>
            </tr>
          </thead>
          <tbody>
            ${d.history.map(r=>`
              <tr>
                <td>${new Date(r[0]).toLocaleDateString()}</td>
                <td><span class="badge ${(r[7]==='MIS'||r[7]==='Disobey')?'badge-mis':'badge-good'}">${(r[7]==='MIS'||r[7]==='Disobey')?'Disobey':'GOOD'}</span></td>
                <td>${r[8]}</td>
                <td><b>${r[9]}</b></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
