<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --primary:#4f46e5;
  --primary-dark:#4338ca;
  --primary-light:#6366f1;
  --success:#059669;
  --success-dark:#047857;
  --danger:#dc2626;
  --danger-dark:#b91c1c;
  --warning:#f59e0b;
  --bg-primary:#f8fafc;
  --bg-secondary:#ffffff;
  --bg-tertiary:#f1f5f9;
  --text-primary:#0f172a;
  --text-secondary:#475569;
  --text-muted:#64748b;
  --border:#e2e8f0;
  --border-dark:#cbd5e1;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 6px rgba(0,0,0,0.07);
  --shadow-lg:0 10px 25px rgba(0,0,0,0.1);
  --shadow-xl:0 20px 40px rgba(0,0,0,0.12);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
}

/* Subtle gradient background */
body::before{
  content:'';
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 10% 20%,rgba(79,70,229,0.03) 0%,transparent 50%),
    radial-gradient(circle at 90% 80%,rgba(5,150,105,0.03) 0%,transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* ===== HEADER ===== */
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}

.header-inner{
  max-width:1600px;
  margin:0 auto;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:16px;
}

.brand-icon{
  width:48px;
  height:48px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  box-shadow:0 4px 12px rgba(79,70,229,0.25);
}

.brand-text h1{
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.5px;
  margin-bottom:2px;
  color:var(--text-primary);
}

.brand-text p{
  font-size:13px;
  color:var(--text-secondary);
  font-weight:500;
}

.logout{
  padding:11px 24px;
  background:linear-gradient(135deg,var(--danger),var(--danger-dark));
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 2px 8px rgba(220,38,38,0.25);
}

.logout:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(220,38,38,0.35);
}

.logout:active{
  transform:translateY(0);
}

/* ===== MAIN CONTENT ===== */
.container{
  max-width:1600px;
  margin:0 auto;
  padding:40px 40px;
  position:relative;
  z-index:1;
}

/* ===== MODULE CARDS ===== */
.module{
  background:var(--bg-secondary);
  border-radius:16px;
  padding:32px;
  margin-bottom:28px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}

.module::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  background:linear-gradient(90deg,var(--primary),var(--primary-light));
  border-radius:16px 16px 0 0;
  opacity:0;
  transition:opacity 0.3s ease;
}

.module:hover{
  box-shadow:var(--shadow-lg);
  transform:translateY(-2px);
}

.module:hover::before{
  opacity:1;
}

/* ===== MODULE HEADER ===== */
.module-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:28px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}

.module-icon{
  width:56px;
  height:56px;
  background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(79,70,229,0.05));
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  border:1px solid rgba(79,70,229,0.15);
}

.module-title h2{
  font-size:22px;
  font-weight:700;
  margin-bottom:4px;
  letter-spacing:-0.5px;
  color:var(--text-primary);
}

.module-title p{
  font-size:14px;
  color:var(--text-secondary);
  font-weight:500;
}

/* ===== CONTROL PANEL ===== */
.control-panel{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
  margin-bottom:24px;
}

/* ===== FORM CONTROLS ===== */
.form-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.form-label{
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.form-control,
.form-select{
  padding:12px 16px;
  background:var(--bg-tertiary);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text-primary);
  font-size:15px;
  font-weight:500;
  transition:all 0.3s ease;
  font-family:'Inter',sans-serif;
}

.form-control:focus,
.form-select:focus{
  outline:none;
  border-color:var(--primary);
  background:var(--bg-secondary);
  box-shadow:0 0 0 4px rgba(79,70,229,0.08);
}

.form-control::placeholder{
  color:var(--text-muted);
}

.form-select{
  cursor:pointer;
}

.form-select option{
  background:var(--bg-secondary);
  color:var(--text-primary);
}

/* ===== BUTTON GROUPS ===== */
.btn-group{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.btn{
  padding:13px 24px;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  position:relative;
  overflow:hidden;
  font-family:'Inter',sans-serif;
}

.btn::before{
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width 0.6s,height 0.6s;
}

.btn:hover::before{
  width:300px;
  height:300px;
}

.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  box-shadow:0 2px 8px rgba(79,70,229,0.3);
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(79,70,229,0.4);
}

.btn-success{
  background:linear-gradient(135deg,var(--success),var(--success-dark));
  color:#fff;
  box-shadow:0 2px 8px rgba(5,150,105,0.3);
}

.btn-success:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(5,150,105,0.4);
}

.btn:active{
  transform:translateY(0);
}

/* ===== DATA TABLE CONTAINER ===== */
.data-container{
  background:var(--bg-tertiary);
  border-radius:12px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
}

.table-wrapper{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

.table-wrapper::-webkit-scrollbar{
  height:10px;
}

.table-wrapper::-webkit-scrollbar-track{
  background:var(--bg-tertiary);
  border-radius:5px;
}

.table-wrapper::-webkit-scrollbar-thumb{
  background:var(--primary);
  border-radius:5px;
}

.table-wrapper::-webkit-scrollbar-thumb:hover{
  background:var(--primary-light);
}

/* ===== TABLE STYLES ===== */
table{
  width:100%;
  min-width:900px;
  border-collapse:collapse;
  background:var(--bg-secondary);
}

thead{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--bg-secondary);
}

th{
  background:linear-gradient(to bottom,#f8fafc,#f1f5f9);
  color:var(--text-secondary);
  padding:16px 20px;
  text-align:left;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
  border-bottom:2px solid var(--border-dark);
  white-space:nowrap;
}

tbody tr{
  border-bottom:1px solid var(--border);
  transition:all 0.2s ease;
}

tbody tr:hover{
  background:var(--bg-tertiary);
}

tbody tr:last-child{
  border-bottom:none;
}

td{
  padding:16px 20px;
  color:var(--text-primary);
  font-size:14px;
  font-weight:500;
  text-align:left;
}

/* Attitude table specific */
#attTable th:nth-child(2),
#attTable td:nth-child(2){
  min-width:360px;
  max-width:420px;
  white-space:nowrap;
}

#attTable td:nth-child(2) input{
  width:100%;
  padding:10px 14px;
  font-size:14px;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text-primary);
  font-weight:500;
  transition:all 0.3s ease;
}

#attTable td:nth-child(2) input:focus{
  outline:none;
  border-color:var(--success);
  box-shadow:0 0 0 3px rgba(5,150,105,0.08);
}

/* Table inputs */
table input{
  width:90px;
  padding:8px 12px;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text-primary);
  text-align:center;
  font-weight:500;
  font-size:14px;
  transition:all 0.3s ease;
}

table input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(79,70,229,0.08);
}

/* Table action buttons */
.table-actions{
  display:flex;
  gap:8px;
  justify-content:center;
}

.btn-sm{
  padding:8px 16px;
  border:none;
  border-radius:8px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s ease;
}

.btn-sm.btn-success{
  background:linear-gradient(135deg,var(--success),var(--success-dark));
  color:#fff;
  box-shadow:0 2px 6px rgba(5,150,105,0.25);
}

.btn-sm.btn-success:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 10px rgba(5,150,105,0.35);
}

.btn-sm.btn-danger{
  background:linear-gradient(135deg,var(--danger),var(--danger-dark));
  color:#fff;
  box-shadow:0 2px 6px rgba(220,38,38,0.25);
}

.btn-sm.btn-danger:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 10px rgba(220,38,38,0.35);
}

.btn-sm:active{
  transform:translateY(0);
}

/* ===== EMPTY STATE ===== */
.empty-state{
  padding:60px 20px;
  text-align:center;
}

.empty-state-icon{
  font-size:48px;
  margin-bottom:16px;
  opacity:0.3;
}

.empty-state-text{
  color:var(--text-secondary);
  font-size:15px;
}

/* ===== BADGE ===== */
.badge{
  display:inline-block;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(79,70,229,0.05));
  color:var(--primary);
  border:1px solid rgba(79,70,229,0.2);
}

/* ===== RESPONSIVE DESIGN ===== */
@media(max-width:768px){
  .header-inner{
    padding:16px 20px;
  }

  .brand-icon{
    width:40px;
    height:40px;
    font-size:20px;
  }

  .brand-text h1{
    font-size:17px;
  }

  .brand-text p{
    font-size:12px;
  }

  .logout{
    padding:9px 16px;
    font-size:13px;
  }

  .container{
    padding:24px 20px;
  }

  .module{
    padding:24px 20px;
    margin-bottom:24px;
    border-radius:14px;
  }

  .module-header{
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
    margin-bottom:20px;
  }

  .module-icon{
    width:48px;
    height:48px;
    font-size:24px;
  }

  .module-title h2{
    font-size:19px;
  }

  .module-title p{
    font-size:13px;
  }

  .control-panel{
    gap:12px;
  }

  .form-control,
  .form-select{
    padding:11px 14px;
    font-size:14px;
  }

  .btn{
    padding:11px 20px;
    font-size:14px;
  }

  table{
    min-width:1000px;
  }

  #attTable{
    min-width:1100px;
  }

  #attTable th:nth-child(2),
  #attTable td:nth-child(2){
    min-width:380px;
  }

  th{
    padding:12px 16px;
    font-size:11px;
  }

  td{
    padding:12px 16px;
    font-size:13px;
  }
}

@media(min-width:768px){
  .control-panel{
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  }

  .btn-group{
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  }
}

@media(min-width:1024px){
  .container{
    padding:48px 40px;
  }

  .module{
    padding:36px;
  }
}

/* ===== LOADING STATE ===== */
.loading{
  position:relative;
  pointer-events:none;
  opacity:0.6;
}

.loading::after{
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:18px;
  height:18px;
  margin:-9px 0 0 -9px;
  border:3px solid var(--border);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* ===== ANIMATIONS ===== */
.module{
  animation:moduleSlideIn 0.5s cubic-bezier(0.4,0,0.2,1) backwards;
}

.module:nth-child(1){animation-delay:0.1s}
.module:nth-child(2){animation-delay:0.2s}
.module:nth-child(3){animation-delay:0.3s}

@keyframes moduleSlideIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ===== ACCESSIBILITY ===== */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}

*:focus-visible{
  outline:2px solid var(--primary);
  outline-offset:2px;
  border-radius:4px;
}

/* Print styles */
@media print{
  .header,.logout,.btn-group{
    display:none;
  }
  
  .module{
    page-break-inside:avoid;
    box-shadow:none;
    border:1px solid #000;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">🎯</div>
      <div class="brand-text">
        <h1>Admin Dashboard</h1>
        <p>Discipline Monitoring System</p>
      </div>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="container">

  <!-- REPORT MODULE -->
  <section class="module">
    <div class="module-header">
      <div class="module-icon">📊</div>
      <div class="module-title">
        <h2>Report Download</h2>
        <p>Generate and export student discipline reports</p>
      </div>
    </div>

    <div class="control-panel">
      <div class="form-group">
        <label class="form-label">Department</label>
        <select id="dept" class="form-select"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Year</label>
        <select id="year" class="form-select"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Section</label>
        <select id="section" class="form-select"></select>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="loadReport()">Load Report</button>
      <button class="btn btn-success" onclick="downloadCSV()">Download CSV</button>
      <button class="btn btn-success" onclick="downloadPDF()">Download PDF</button>
    </div>

    <div class="data-container" style="margin-top:24px">
      <div class="table-wrapper">
        <table id="report"></table>
      </div>
    </div>
  </section>

  <!-- HOD MAIL MODULE -->
  <section class="module">
    <div class="module-header">
      <div class="module-icon">📧</div>
      <div class="module-title">
        <h2>Draft HoD Mail</h2>
        <p>Create email drafts for Head of Departments</p>
      </div>
    </div>

    <div class="control-panel">
      <div class="form-group">
        <label class="form-label">From Date</label>
        <input type="date" id="fromDate" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">To Date</label>
        <input type="date" id="toDate" class="form-control">
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="createHoDDrafts()">Create Draft Mails</button>
    </div>
  </section>

  <!-- ATTITUDE MASTER MODULE -->
  <section class="module">
    <div class="module-header">
      <div class="module-icon">🧠</div>
      <div class="module-title">
        <h2>Attitude Master</h2>
        <p>Manage student attitude behaviors and scoring</p>
      </div>
    </div>

    <div class="control-panel">
      <div class="form-group">
        <label class="form-label">Attitude Type</label>
        <select id="attType" class="form-select">
          <option value="Disobey">Disobey</option>
          <option value="GOOD">GOOD</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Attitude Name</label>
        <input id="attName" class="form-control" placeholder="Enter attitude name">
      </div>
      <div class="form-group">
        <label class="form-label">Marks</label>
        <input id="attMarks" type="number" class="form-control" placeholder="Enter marks">
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-success" onclick="addAttitude()">Add Attitude</button>
    </div>

    <div class="data-container" style="margin-top:24px">
      <div class="table-wrapper">
        <table id="attTable"></table>
      </div>
    </div>
  </section>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
<script src="app.js"></script>

<script>
  loadFilters();
  loadAttitudeMaster();
</script>

</body>
</html>
