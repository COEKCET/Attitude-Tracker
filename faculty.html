<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --primary:#4f46e5;
  --primary-dark:#4338ca;
  --primary-light:#6366f1;
  --success:#059669;
  --success-dark:#047857;
  --success-light:#10b981;
  --danger:#dc2626;
  --danger-dark:#b91c1c;
  --danger-light:#ef4444;
  --info:#0284c7;
  --info-dark:#0369a1;
  --bg-primary:#f8fafc;
  --bg-secondary:#ffffff;
  --bg-tertiary:#f1f5f9;
  --text-primary:#0f172a;
  --text-secondary:#475569;
  --text-muted:#64748b;
  --border:#e2e8f0;
  --border-dark:#cbd5e1;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 6px rgba(0,0,0,0.07);
  --shadow-lg:0 10px 25px rgba(0,0,0,0.1);
}

body{
  margin:0;
  padding-bottom:0;
  font-family:'Inter',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
}

/* Subtle gradient background */
body::before{
  content:'';
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 10% 20%,rgba(79,70,229,0.03) 0%,transparent 50%),
    radial-gradient(circle at 90% 80%,rgba(5,150,105,0.03) 0%,transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* ===== HEADER ===== */
.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}

.topbar-inner{
  max-width:900px;
  margin:0 auto;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand-icon{
  width:42px;
  height:42px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  box-shadow:0 4px 12px rgba(79,70,229,0.25);
}

.brand h2{
  font-size:19px;
  font-weight:700;
  letter-spacing:-0.5px;
  color:var(--text-primary);
  margin:0;
}

.logout{
  padding:10px 20px;
  background:linear-gradient(135deg,var(--danger),var(--danger-dark));
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 2px 8px rgba(220,38,38,0.25);
}

.logout:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(220,38,38,0.35);
}

.logout:active{
  transform:translateY(0);
}

/* ===== MAIN CONTENT ===== */
.page{
  max-width:900px;
  margin:0 auto;
  padding:32px 24px 80px;
  position:relative;
  z-index:1;
}

/* ===== SECTION CARDS ===== */
.section{
  background:var(--bg-secondary);
  border-radius:16px;
  padding:28px;
  margin-bottom:24px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  animation:fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) backwards;
}

.section:nth-child(1){animation-delay:0.1s}
.section:nth-child(2){animation-delay:0.2s}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.section:hover{
  box-shadow:var(--shadow-lg);
  transform:translateY(-2px);
}

/* ===== SECTION HEADER ===== */
.section-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
  padding-bottom:16px;
  border-bottom:1px solid var(--border);
}

.section-icon{
  width:44px;
  height:44px;
  background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(79,70,229,0.05));
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  border:1px solid rgba(79,70,229,0.15);
}

.section-header h3{
  font-size:19px;
  font-weight:700;
  letter-spacing:-0.3px;
  color:var(--text-primary);
  margin:0;
}

/* ===== FORM CONTROLS ===== */
.filters{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.form-label{
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.filters input,
.filters select{
  padding:12px 16px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
  font-weight:500;
  background:var(--bg-tertiary);
  color:var(--text-primary);
  transition:all 0.3s ease;
  font-family:'Inter',sans-serif;
}

.filters input:focus,
.filters select:focus{
  outline:none;
  border-color:var(--primary);
  background:var(--bg-secondary);
  box-shadow:0 0 0 4px rgba(79,70,229,0.08);
}

.filters input::placeholder{
  color:var(--text-muted);
}

.filters select{
  cursor:pointer;
}

.filters select option{
  background:var(--bg-secondary);
  color:var(--text-primary);
}

/* ===== BUTTONS ===== */
.filters button{
  padding:13px 20px;
  border-radius:10px;
  border:none;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  font-family:'Inter',sans-serif;
  position:relative;
  overflow:hidden;
}

.filters button::before{
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width 0.6s,height 0.6s;
}

.filters button:hover::before{
  width:300px;
  height:300px;
}

.filters button:not(.history){
  background:linear-gradient(135deg,var(--success),var(--success-dark));
  color:#fff;
  box-shadow:0 2px 8px rgba(5,150,105,0.3);
}

.filters button:not(.history):hover{
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(5,150,105,0.4);
}

.filters button.history{
  background:linear-gradient(135deg,var(--info),var(--info-dark));
  color:#fff;
  box-shadow:0 2px 8px rgba(2,132,199,0.3);
}

.filters button.history:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(2,132,199,0.4);
}

.filters button:active{
  transform:translateY(0);
}

/* ===== STUDENT INFO ===== */
#student{
  background:linear-gradient(135deg,rgba(5,150,105,0.08),rgba(5,150,105,0.04));
  border-left:4px solid var(--success);
  padding:16px 20px;
  border-radius:12px;
  margin-top:20px;
  font-weight:600;
  color:var(--text-primary);
  box-shadow:var(--shadow-sm);
  animation:slideIn 0.4s ease;
}

@keyframes slideIn{
  from{
    opacity:0;
    transform:translateX(-20px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

#student:empty{
  display:none;
}

/* ===== BADGES ===== */
.badge-container{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 0;
}

.badge-label{
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 16px;
  border-radius:20px;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.3px;
  transition:all 0.3s ease;
}

.badge::before{
  content:'';
  width:8px;
  height:8px;
  border-radius:50%;
  display:inline-block;
}

.badge-good{
  background:linear-gradient(135deg,rgba(5,150,105,0.15),rgba(5,150,105,0.08));
  color:var(--success-dark);
  border:1px solid rgba(5,150,105,0.3);
}

.badge-good::before{
  background:var(--success);
  box-shadow:0 0 8px var(--success);
}

.badge-bad{
  background:linear-gradient(135deg,rgba(220,38,38,0.15),rgba(220,38,38,0.08));
  color:var(--danger-dark);
  border:1px solid rgba(220,38,38,0.3);
  animation:badgePulse 2s infinite;
}

.badge-bad::before{
  background:var(--danger);
  box-shadow:0 0 8px var(--danger);
  animation:dotPulse 1.5s infinite;
}

@keyframes badgePulse{
  0%{box-shadow:0 0 0 0 rgba(220,38,38,0.4)}
  50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}
  100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}
}

@keyframes dotPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.2)}
}

/* ===== LOADER ===== */
.loader{
  display:none;
  text-align:center;
  margin:20px 0;
}

.loader::after{
  content:"";
  width:32px;
  height:32px;
  border:4px solid var(--border);
  border-top:4px solid var(--primary);
  border-radius:50%;
  display:inline-block;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* ===== HISTORY ===== */
#history{
  background:var(--bg-tertiary);
  color:var(--text-primary);
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  overflow-x:auto;
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  animation:slideIn 0.4s ease;
}

#history:empty{
  display:none;
}

#history table{
  width:100%;
  border-collapse:collapse;
  min-width:600px;
}

#history th{
  background:var(--bg-secondary);
  color:var(--text-secondary);
  padding:12px;
  text-align:left;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
  border-bottom:2px solid var(--border-dark);
}

#history td{
  padding:12px;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

#history tr:hover{
  background:var(--bg-secondary);
}

/* ===== BOTTOM NAV (MOBILE) ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
  border-top:1px solid var(--border);
  z-index:999;
}

.bottom-nav button{
  background:none;
  border:none;
  color:var(--text-muted);
  font-size:13px;
  font-weight:600;
  padding:8px 16px;
  cursor:pointer;
  transition:all 0.3s ease;
  border-radius:8px;
}

.bottom-nav button:hover{
  background:var(--bg-tertiary);
  color:var(--text-primary);
}

.bottom-nav button.active{
  color:var(--success);
  background:rgba(5,150,105,0.1);
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .topbar-inner{
    padding:14px 20px;
  }

  .brand-icon{
    width:36px;
    height:36px;
    font-size:18px;
  }

  .brand h2{
    font-size:17px;
  }

  .logout{
    padding:8px 16px;
    font-size:13px;
  }

  .page{
    padding:24px 20px 100px;
  }

  .section{
    padding:20px;
    margin-bottom:20px;
  }

  .section-icon{
    width:40px;
    height:40px;
    font-size:20px;
  }

  .section-header h3{
    font-size:17px;
  }

  .filters input,
  .filters select,
  .filters button{
    padding:11px 14px;
    font-size:14px;
  }

  #student{
    padding:14px 16px;
    font-size:14px;
  }

  .badge{
    padding:6px 14px;
    font-size:12px;
  }
}

@media(min-width:768px){
  .page{
    padding-bottom:32px;
  }

  .bottom-nav{
    display:none;
  }

  .filters{
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  }
}

/* ===== ACCESSIBILITY ===== */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}

*:focus-visible{
  outline:2px solid var(--primary);
  outline-offset:2px;
  border-radius:4px;
}

/* ===== EMPTY STATES ===== */
.empty-state{
  text-align:center;
  padding:40px 20px;
  color:var(--text-secondary);
}

.empty-state-icon{
  font-size:48px;
  margin-bottom:12px;
  opacity:0.3;
}

.empty-state-text{
  font-size:15px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-icon">👨‍🏫</div>
      <h2>Faculty Dashboard</h2>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="page">

  <!-- SEARCH SECTION -->
  <section class="section">
    <div class="section-header">
      <div class="section-icon">🔍</div>
      <h3>Search Student</h3>
    </div>

    <div class="filters">
      <div class="form-group">
        <label class="form-label">Student Roll Number</label>
        <input id="roll" placeholder="Enter roll number">
      </div>
      <button onclick="showLoader('search'); loadStudent()">Search Student</button>
    </div>

    <div class="loader" id="loaderSearch"></div>
    <div id="student"></div>
  </section>

  <!-- ENTRY SECTION -->
  <section class="section">
    <div class="section-header">
      <div class="section-icon">🧠</div>
      <h3>Behavioural Entry</h3>
    </div>

    <div class="filters">
      <div class="form-group">
        <label class="form-label">Entry Type</label>
        <select id="type" onchange="updateBadge(); loadAttitude()">
          <option value="Disobey">Disobey</option>
          <option value="GOOD">GOOD</option>
        </select>
      </div>

      <div class="badge-container">
        <span class="badge-label">Selected:</span>
        <span id="typeBadge" class="badge badge-bad">Disobey</span>
      </div>

      <div class="form-group">
        <label class="form-label">Attitude</label>
        <select id="attitude"></select>
      </div>

      <div class="form-group">
        <label class="form-label">Remarks</label>
        <input id="remarks" placeholder="Add your remarks here">
      </div>

      <button onclick="showLoader('save'); save()">Save Entry</button>
      <button class="history" onclick="viewHistory()">View History</button>
    </div>

    <div class="loader" id="loaderSave"></div>
    <div id="history"></div>
  </section>

</div>

<!-- BOTTOM NAV (MOBILE) -->
<div class="bottom-nav">
  <button class="active">Entry</button>
  <button onclick="viewHistory()">History</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- ORIGINAL JS -->
<script src="app.js"></script>

<script>
/* UI ONLY – DOES NOT TOUCH LOGIC */
function updateBadge(){
  const badge=document.getElementById("typeBadge");
  if(type.value==="GOOD"){
    badge.textContent="GOOD";
    badge.className="badge badge-good";
  }else{
    badge.textContent="BAD";
    badge.className="badge badge-bad";
  }
}

/* Loader helper – NO logic change */
function showLoader(which){
  if(which==="search"){
    loaderSearch.style.display="block";
    setTimeout(()=>loaderSearch.style.display="none",800);
  }
  if(which==="save"){
    loaderSave.style.display="block";
    setTimeout(()=>loaderSave.style.display="none",800);
  }
}
</script>

</body>
</html>
